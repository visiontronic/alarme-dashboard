<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar - Alarme Veicular</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0b0d12">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #0b0d12; color: #e8eaed;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .box { width: 100%; max-width: 340px; text-align: center; }
  .logo { font-size: 3em; margin-bottom: 8px; }
  h1 { font-size: 1.3em; margin-bottom: 28px; }
  input {
    width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #232733;
    background: #151820; color: #fff; font-size: 1em; margin-bottom: 14px;
  }
  button {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: #1d4ed8; color: #fff; font-size: 1em; font-weight: 600; cursor: pointer;
  }
  button:active { background: #1e40af; }
  .erro {
    margin-top: 14px; padding: 10px; border-radius: 8px;
    background: #7f1d1d; color: #fca5a5; font-size: 0.9em; display: none;
  }
</style>
</head>
<body>
<div class="box">
  <div class="logo">🚗</div>
  <h1>Alarme Veicular</h1>
  <input id="senha" type="password" placeholder="Senha de acesso"
         onkeydown="if(event.key==='Enter')entrar()">
  <button onclick="entrar()">Entrar</button>
  <div id="erro" class="erro">Senha incorreta.</div>
</div>

<script>
// Se já tiver token salvo, vai direto pro dashboard
if (sessionStorage.getItem("dash_token")) {
  location.href = "/dashboard";
}

async function entrar() {
  const senha = document.getElementById("senha").value;
  const erro = document.getElementById("erro");

  try {
    const r = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ senha }),
    });
    if (r.ok) {
      const d = await r.json();
      sessionStorage.setItem("dash_token", d.token);
      location.href = "/dashboard";
    } else {
      erro.style.display = "block";
    }
  } catch {
    erro.textContent = "Erro de conexão com o servidor.";
    erro.style.display = "block";
  }
}
</script>
</body>
</html>
